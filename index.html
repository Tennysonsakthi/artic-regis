<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTIC MARKET Registration</title>
    
    <!-- Original Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Premium Sleek App Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- DM Sans strictly for input form styling -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP for Smooth Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f9f6;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none; /* Prevents native pull-to-refresh / rubber banding on mobile */
        }

        /* Safe Typography Classes Explicit to Zones */
        .font-display { font-family: 'Anton', sans-serif; }
        .font-heading-new { font-family: 'Outfit', sans-serif; } 
        .font-body-new { font-family: 'Plus Jakarta Sans', sans-serif; } 

        .bg-pattern {
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(34, 197, 94, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(250, 204, 21, 0.05) 0%, transparent 20%);
        }

        .page-transition {
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s;
        }

        .hidden-page {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            pointer-events: none;
            visibility: hidden;
            z-index: 0;
        }

        .visible-page {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            visibility: visible;
            z-index: 10;
        }

        .texture {
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.1;
        }

        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 50px transparent inset !important;
            transition: background-color 5000s ease-in-out 0s !important;
            font-family: 'DM Sans', sans-serif;
        }

        /* =========================================
           RESPONSIVE FORM FIELD UI STYLES
           ========================================= */
        :root {
            --green: #16a34a;
            --green-light: #22c55e;
            --yellow: #facc15;
            --white: #ffffff;
            --ink: #0f1a0d;
        }

        .field { position: relative; width: 100%; opacity: 0; }
        
        .field-inner {
            position: relative; height: 56px; background: #f8faf8; border-radius: 14px; border: 1.5px solid #e5e9e5;
            display: flex; align-items: center; overflow: hidden; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; cursor: text;
        }
        @media(min-width: 640px) {
            .field-inner { height: 68px; border-radius: 16px; }
        }
        .field-inner:focus-within { border-color: var(--green-light); background: #fff; box-shadow: 0 0 0 4px rgba(34,197,94,0.1); }

        .field-icon { width: 48px; height: 100%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        @media(min-width: 640px) { .field-icon { width: 52px; } }
        .field-icon svg { color: #9ca3af; transition: color 0.2s; }
        .field-inner:focus-within .field-icon svg { color: var(--green); }

        .field-phone-prefix {
            display: flex; align-items: center; gap: 6px; padding: 0 12px 0 14px; height: 100%;
            border-right: 1.5px solid #e5e9e5; flex-shrink: 0; transition: border-color 0.2s;
        }
        @media(min-width: 640px) { .field-phone-prefix { padding: 0 14px 0 18px; } }
        .field-inner:focus-within .field-phone-prefix { border-color: #c8e6c9; }
        
        .field-phone-prefix img { width: 18px; height: auto; border-radius: 2px; }
        @media(min-width: 640px) { .field-phone-prefix img { width: 20px; } }
        
        .field-phone-prefix span { font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: 0.02em; font-family: 'DM Sans', sans-serif;}
        @media(min-width: 640px) { .field-phone-prefix span { font-size: 15px; } }

        .field-content { flex: 1; position: relative; height: 100%; display: flex; align-items: flex-end; overflow: hidden; }

        label.float-label {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; font-weight: 500;
            color: #9ca3af; pointer-events: none; transition: top 0.2s, font-size 0.2s, color 0.2s, transform 0.2s;
            transform-origin: left center; z-index: 2; letter-spacing: 0.01em; font-family: 'DM Sans', sans-serif;
        }
        @media(min-width: 640px) { label.float-label { left: 16px; font-size: 14px; } }
        
        .field-content.filled label.float-label,
        .field-inner:focus-within .field-content label.float-label {
            top: 13px; font-size: 10px; color: var(--green); transform: translateY(0); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
        }
        @media(min-width: 640px) {
            .field-content.filled label.float-label,
            .field-inner:focus-within .field-content label.float-label { top: 14px; font-size: 10.5px; }
        }
        .field-content label.float-label.phone { left: 12px; }
        @media(min-width: 640px) { .field-content label.float-label.phone { left: 14px; } }

        input.field-input {
            position: absolute; bottom: 0; left: 0; right: 0; height: 38px; background: transparent; border: none; outline: none;
            padding: 0 14px 6px 14px; font-size: 14.5px; font-weight: 600; color: var(--ink); font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.01em; z-index: 1; width: 100%;
        }
        @media(min-width: 640px) { input.field-input { height: 42px; padding: 0 16px 8px 16px; font-size: 15.5px; } }
        
        input.field-input.phone { padding: 0 12px 6px 12px; }
        @media(min-width: 640px) { input.field-input.phone { padding: 0 14px 8px 14px; } }

        .field-check {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px;
            border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s; flex-shrink: 0;
        }
        @media(min-width: 640px) { .field-check { right: 16px; width: 20px; height: 20px; } }
        
        .field-check.visible { opacity: 1; }
        .field-check svg { color: white; width: 10px; height: 10px; }
        @media(min-width: 640px) { .field-check svg { width: 11px; height: 11px; } }

        .submit-btn {
            width: 100%; height: 56px; background: var(--ink); color: var(--white); border: none; border-radius: 14px;
            font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.03em; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.25s ease; opacity: 0;
        }
        @media(min-width: 640px) { .submit-btn { height: 64px; border-radius: 16px; gap: 10px; font-size: 17px; } }
        @media(min-width: 768px) { .submit-btn { height: 68px; font-size: 18px; } }
        
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(15,26,13,0.4); }
        .submit-btn:active { transform: scale(0.98); }
        
        .submit-btn .btn-badge {
            width: 22px; height: 22px; border-radius: 6px; background: var(--yellow);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        @media(min-width: 640px) { .submit-btn .btn-badge { width: 24px; height: 24px; border-radius: 8px; } }
        
        .submit-btn .btn-badge svg { color: var(--ink); width: 12px; height: 12px; }
        @media(min-width: 640px) { .submit-btn .btn-badge svg { width: 13px; height: 13px; } }

        .trust-row { display: flex; align-items: center; justify-content: center; opacity: 0; }
        .trust-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #9ca3af; font-weight: 600; font-family: 'DM Sans', sans-serif; }
        .trust-item svg { color: var(--green-light); flex-shrink: 0; }
    </style>
</head>
<body class="bg-pattern sm:overflow-auto overflow-hidden">
    
    <!-- Stable Render Core -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-cover bg-center transition-all duration-700" 
             style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.65)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1920&h=1080'); filter: brightness(0.9);">
        </div>
        <div class="absolute inset-0 texture pointer-events-none"></div>
    </div>

    <!-- Layout Grid: Mobile is strictly fixed to 100% viewport to entirely remove scrolling. Reverts to standard behavior on Desktop. -->
    <div class="fixed inset-0 sm:relative z-10 grid w-full place-items-center overflow-hidden sm:min-h-screen sm:overflow-visible">
        
        <!-- ================= RESPONSIVE FORM PAGE ================= -->
        <!-- Added pt-8 & pb-[72px] specifically to shrink the white box safely from bottom side only on mobile -->
        <div id="page-form" class="font-body-new page-transition visible-page w-full h-full flex flex-col justify-center items-center px-3.5 pt-8 pb-[72px] sm:py-10 sm:px-5 relative" style="grid-area: 1/1;">
            
            <div class="absolute top-[52px] left-[32px] sm:fixed sm:top-8 sm:left-8 z-[100] gsap-back-btn">
                <button class="group flex items-center justify-center w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 bg-transparent sm:bg-white rounded-full sm:shadow-[0_12px_24px_rgba(0,0,0,0.2)] transition-all sm:hover:bg-gray-100 active:scale-90 outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sm:h-5 sm:w-5 md:h-6 md:w-6 text-[#9ca3af] sm:text-gray-800 transition-transform duration-300 group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
            </div>

            <!-- Removed min-h on mobile (min-h-0) so flex perfectly controls it on strictly locked short devices without ever triggering scrolling! -->
            <div class="w-full flex-1 sm:flex-none h-auto min-h-[400px] sm:min-h-0 max-w-[520px] max-h-full bg-white rounded-[26px] sm:rounded-[32px] md:rounded-[40px] px-6 py-7 sm:px-7 sm:pt-14 sm:pb-[48px] md:px-12 md:pt-[75px] md:pb-[53px] shadow-[0_20px_40px_-10px_rgba(0,0,0,0.3)] sm:shadow-[0_30px_60px_-15px_rgba(0,0,0,0.7)] flex flex-col justify-center relative mt-0 sm:mt-0 gsap-card mx-auto">
                
                <div class="mb-8 sm:mb-[36px] w-full text-center mt-3 sm:mt-0">
                    <h2 class="font-heading-new text-[34px] sm:text-4xl md:text-[46px] font-black tracking-[-0.01em] leading-none flex justify-center items-center gap-2 sm:block">
                        <span class="text-[#22c55e] uppercase">ARTIC</span> <span class="text-[#facc15] uppercase">MARKET</span>
                    </h2>
                    <p class="text-gray-500 text-[13.5px] sm:text-[14.5px] md:text-[16px] font-semibold mt-3 sm:mt-4 max-w-[320px] mx-auto leading-relaxed px-2 sm:px-0">Secure your lifetime wholesale access code.</p>
                </div>
                
                <form id="regForm" onsubmit="event.preventDefault();" class="w-full space-y-[20px] sm:space-y-[18px]">
                    
                    <div class="field">
                        <div class="field-inner">
                            <div class="field-icon">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </div>
                            <div class="field-content" id="fc-name">
                                <label class="float-label" for="fname">FULL NAME</label>
                                <input class="field-input" type="text" id="fname" required autocomplete="name" oninput="handleInput(this,'fc-name')">
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-inner">
                            <div class="field-phone-prefix">
                                <img src="https://flagcdn.com/in.svg" alt="India" loading="lazy">
                                <span>+91</span>
                            </div>
                            <div class="field-content" id="fc-phone">
                                <label class="float-label phone" for="fphone">MOBILE NUMBER</label>
                                <input class="field-input phone" type="tel" id="fphone" required pattern="[0-9]{10}" maxlength="10" inputmode="numeric" oninput="handleInput(this,'fc-phone','chk-phone');this.value=this.value.replace(/\D/g,'')">
                            </div>
                            <div class="field-check" id="chk-phone">
                                <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-inner">
                            <div class="field-icon">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            </div>
                            <div class="field-content" id="fc-place">
                                <label class="float-label" for="fplace">CITY / TOWN</label>
                                <input class="field-input" type="text" id="fplace" required autocomplete="address-level2" oninput="handleInput(this,'fc-place')">
                            </div>
                        </div>
                    </div>

                    <div class="pt-[34px] sm:pt-8 w-full">
                        <button type="submit" class="submit-btn" id="submitBtn">
                            <span>Complete Registration</span>
                            <div class="btn-badge">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
                            </div>
                        </button>
                        
                        <!-- Accurately reduced by exactly 4px from previous (mt-[32px]), strictly untouched on Desktop sm:mt-[20px] -->
                        <div class="trust-row mt-[32px] sm:mt-[20px]">
                            <div class="trust-item">
                                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                                Secure & Encrypted
                            </div>
                        </div>
                    </div>

                </form>
            </div>
        </div>

    </div>

    <script>
        function handleInput(input, fcId, chkId) {
            const fc = document.getElementById(fcId);
            const chk = chkId ? document.getElementById(chkId) : null;
            
            if (input.value.trim().length > 0) {
                fc.classList.add('filled');
                if (chk) {
                    const valid = input.type === 'tel' ? /^[0-9]{10}$/.test(input.value) : input.value.trim().length >= 2;
                    chk.classList.toggle('visible', valid);
                }
            } else {
                fc.classList.remove('filled');
                if (chk) chk.classList.remove('visible');
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            gsap.fromTo("#page-form .gsap-card", 
                { opacity: 0, y: 50, scale: 0.98 }, 
                { opacity: 1, y: 0, scale: 1, duration: 0.85, ease: "power3.out", delay: 0.1 }
            );
            
            gsap.fromTo(".field", 
                { opacity: 0, x: -16 }, 
                { opacity: 1, x: 0, duration: 0.55, stagger: 0.09, ease: "power2.out", delay: 0.25, clearProps: "transform" }
            );

            gsap.fromTo(".submit-btn", 
                { opacity: 0, y: 16 }, 
                { opacity: 1, y: 0, duration: 0.55, ease: "power2.out", delay: 0.55, clearProps: "transform" }
            );

            gsap.fromTo(".trust-row", 
                { opacity: 0, y: 16 }, 
                { opacity: 1, y: 0, duration: 0.5, ease: "power2.out", delay: 0.65, clearProps: "transform" }
            );
            
            gsap.fromTo(".gsap-back-btn", 
                { opacity: 0, scale: 0.5, x: -10, rotation: -20 }, 
                { opacity: 1, scale: 1, x: 0, rotation: 0, duration: 0.8, ease: "back.out(1.5)", delay: 0.35 }
            );
        });
    </script>
</body>
</html>s
